<!doctype html><html lang="tr"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PATPAT • SMM</title><style>:root{--bg:#23130f;--card:#3a1f18;--line:rgba(255,255,255,.12);--text:#fff1eb;--muted:#e3beb0;--danger:#cf2f38;--dangerH:#e13e47}body{margin:0;background:linear-gradient(180deg,#23130f,#2d1812);color:var(--text);font-family:system-ui}.wrap{padding:14px;position:relative}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.muted{color:var(--muted)}.row{display:flex;gap:8px;flex-wrap:wrap}.btn{height:36px;border-radius:10px;border:1px solid var(--line);background:#3a1f18;color:var(--text);padding:0 10px;cursor:pointer}.fs{position:absolute;top:14px;right:14px;border:0;border-radius:12px;background:var(--danger);color:#fff;font-weight:900;padding:10px 12px;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.25)}.fs:hover{background:var(--dangerH)}</style></head><body data-page="sidepanel"><div class="wrap" id="smmRoot"><button id="btnSmmFullscreen" class="fs" type="button">TAM EKRAN GÖSTER</button><div class="card"><h3>SMM Yönetim Ekranı</h3><p class="muted">SMM modülüne ait UI ve event kodları yalnızca SMM dosyalarında tutulur.</p><div class="row"><button class="btn" id="btnSmmStart">Tarama Başlat</button><button class="btn" id="btnSmmStop">Durdur</button></div><p id="smmStatus" class="muted">Durum: Hazır</p></div></div><script src="smm.js"></script></body></html>
