<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PATPAT • Şikayet</title>
  <style>
    :root{--bg:#102216;--card:#173323;--line:rgba(255,255,255,.12);--text:#ecfff2;--muted:#b6dec2;--accent:#4fdc8c}
    body{margin:0;background:linear-gradient(180deg,#102216,#122a1b);color:var(--text);font-family:system-ui}
    .wrap{padding:14px}
    .tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .tabs a{padding:8px 10px;border:1px solid var(--line);border-radius:10px;color:var(--text);text-decoration:none}
    .tabs a.active{background:color-mix(in oklab,var(--accent) 28%, transparent)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .btn,input,textarea,select{height:36px;border-radius:10px;border:1px solid var(--line);background:#163021;color:var(--text);padding:0 10px}
    .btn{cursor:pointer}
    textarea{height:auto;padding:10px}
    .hint,.empty{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:1.1fr 1.2fr 1fr;gap:10px}
    .mini{font-size:12px;color:var(--muted)}
    @media (max-width:1000px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body data-page="sidepanel">
  <div class="wrap">
    <div class="tabs">
      <a href="siparis.html">Sipariş</a>
      <a href="rakip.html">Rakip</a>
      <a class="active" href="sikayet.html">Şikayet</a>
      <a href="smm.html">SMM</a>
      <a href="sidepanel.html">Ana Panel</a>
    </div>

    <div class="card">
      <h3>Müşteri Şikayet Yönetimi (Gelişmiş Tarama)</h3>
      <div class="row">
        <input id="inpComplaintPages" type="number" min="1" max="200" value="5" placeholder="Kaç sayfa"/>
        <input id="inpComplaintDays" type="number" min="1" max="365" value="5" placeholder="Kaç gün"/>
        <input id="inpComplaintToday" type="text" value="24 ŞUBAT" placeholder="24 ŞUBAT"/>
        <input id="inpComplaintNid" type="range" min="-100" max="500" step="100" value="0"/>
        <span class="mini">NID: <b id="complaintNidValue">0</b></span>
        <button class="btn" id="btnComplaintVerify" type="button">Oturumu Doğrula</button>
        <button class="btn" id="btnComplaintScan" type="button">Şikayet Tara</button>
        <button class="btn" id="btnComplaintStop" type="button">Durdur</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn" id="btnComplaintDraft" type="button">Yanıt Taslağı</button>
        <button class="btn" id="btnComplaintSolution" type="button">Çözüm Öner</button>
        <button class="btn" id="btnComplaintEscalate" type="button">Yöneticiye Eskale</button>
        <button class="btn" id="btnComplaintClose" type="button">Şikayeti Kapat</button>
      </div>
      <div class="row" style="margin-top:8px">
        <input id="inpComplaintSearch" type="text" placeholder="Ara: SMM ID, kullanıcı, durum" style="min-width:280px"/>
      </div>
      <div class="hint" id="complaintTargetDays">Hedef günler: —</div>
      <div class="hint" id="complaintStats">Kayıt: 0 • SLA Risk: 0</div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <div class="hint">Liste (SMM ID, müşteri, durum, SLA)</div>
          <div id="complaintsList" style="max-height:380px;overflow:auto"></div>
        </div>
        <div>
          <div class="hint">Detay + Kanıt</div>
          <div id="complaintDetail" style="min-height:240px"></div>
        </div>
        <div>
          <div class="hint">Eylem</div>
          <textarea id="complaintDraftText" style="min-height:220px" placeholder="Yanıt taslağı burada oluşur."></textarea>
          <div class="row" style="margin-top:8px">
            <button class="btn" id="btnComplaintCopyDraft" type="button">Taslağı Kopyala</button>
            <button class="btn" id="btnComplaintOpenMessage" type="button">Mesaj Sayfasına Git</button>
          </div>
          <div class="hint" id="complaintActionHint">Hazır.</div>
        </div>
      </div>
    </div>
  </div>
  <script src="sikayet.js"></script>
</body>
</html>
