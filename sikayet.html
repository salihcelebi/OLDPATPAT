<!doctype html><html lang="tr"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PATPAT • Şikayet</title><style>:root{--bg:#102216;--card:#173323;--line:rgba(255,255,255,.12);--text:#ecfff2;--muted:#b6dec2;--accent:#4fdc8c}body{margin:0;background:linear-gradient(180deg,#102216,#122a1b);color:var(--text);font-family:system-ui}.wrap{padding:14px}.tabs{display:flex;gap:8px;margin-bottom:12px}.tabs a{padding:8px 10px;border:1px solid var(--line);border-radius:10px;color:var(--text);text-decoration:none}.tabs a.active{background:color-mix(in oklab,var(--accent) 28%, transparent)}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.row{display:flex;gap:8px;flex-wrap:wrap}.btn,input,textarea{height:36px;border-radius:10px;border:1px solid var(--line);background:#163021;color:var(--text);padding:0 10px}.btn{cursor:pointer}textarea{height:auto;padding:10px}.hint,.empty{color:var(--muted)}</style></head><body data-page="sidepanel"><div class="wrap"><div class="tabs"><a href="siparis.html">Sipariş</a><a href="rakip.html">Rakip</a><a class="active" href="sikayet.html">Şikayet</a><a href="smm.html">SMM</a><a href="sidepanel.html">Ana Panel</a></div><div class="card"><h3>Müşteri Şikayet Yönetimi</h3><div class="row"><input id="inpComplaintPages" type="number" min="1" max="50" value="5"/><input id="rngComplaintSpeed" type="range" min="1" max="10" value="5"/><button class="btn" id="btnComplaintScan">Şikayet Tara</button><button class="btn" id="btnComplaintStop">Durdur</button><button class="btn" id="btnComplaintDraft">Taslak</button><button class="btn" id="btnComplaintSolution">Çözüm</button><button class="btn" id="btnComplaintEscalate">Eskale</button><button class="btn" id="btnComplaintClose">Kapat</button></div><div class="row"><input id="inpComplaintSearch" type="text" placeholder="Ara"/></div><div class="hint" id="complaintStats">Kayıt: 0 • SLA Risk: 0</div></div><div
