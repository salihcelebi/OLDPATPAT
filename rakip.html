<!doctype html><html lang="tr"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PATPAT • RAKİP</title><style>:root{--bg:#11132a;--card:#20193d;--line:rgba(255,255,255,.12);--text:#f2edff;--muted:#b8aedd;--danger:#cf2f38;--dangerH:#e13e47}body{margin:0;background:linear-gradient(180deg,#11132a,#1a1531);color:var(--text);font-family:system-ui}.wrap{padding:14px;position:relative}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.row{display:flex;gap:8px;flex-wrap:wrap}.btn,select,input{height:36px;border-radius:10px;border:1px solid var(--line);background:#191633;color:var(--text);padding:0 10px}.btn{cursor:pointer}table{width:100%;border-collapse:collapse;min-width:900px}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left}.empty,.hint{color:var(--muted)}.fs{position:absolute;top:14px;right:14px;border:0;border-radius:12px;background:var(--danger);color:#fff;font-weight:900;padding:10px 12px;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.25)}.fs:hover{background:var(--dangerH)}</style></head><body data-page="sidepanel"><div class="wrap" id="rakipRoot"><button id="btnRakipFullscreen" class="fs" type="button">TAM EKRAN GÖSTER</button><div class="card"><h3>Rakip Tarama</h3><div class="row"><select id="selPlatform"><option value="">Platform seç</option><option value="hepsi">hepsi</option><option value="tiktok">tiktok</option><option value="instagram">instagram</option><option value="youtube">youtube</option><option value="twitter">twitter</option></select><select id="selService"><option value="">Önce platform seç</option></select><input id="inpQtyMin" type="text" placeholder="Min adet"/><input id="inpQtyMax" type="text" placeholder="Max adet"/><input id="inpRakipPageCount" type="number" min="1" max="50" value="1"/><button class="btn" id="btnRakipStart">Başlat</button><button class="btn" id="btnRakipStop">Durdur</button><button class="btn" id="btnRakipClear">Temizle</button></div><div class="row"><button class="btn" id="btnPickService">Hizmet Pick</button><button class="btn" id="btnPickShop">Mağaza Pick</button><button class="btn" id="btnPickWarranty">Garanti Pick</button><button class="btn" id="btnPickSuccess">Başarı Pick</button><button class="btn" id="btnPickPrice">Fiyat Pick</button><button class="btn" id="btnPickAdPower">Reklam Pick</button><button class="btn" id="btnPickCancel">İptal</button></div><div class="row"><select id="selRakipTemplate"></select><button class="btn" id="btnRakipTemplateUse">Aktif Yap</button><button class="btn" id="btnRakipTemplateDelete">Şablon Sil</button><button class="btn" id="btnRakipCopyMd">MD</button><button class="btn" id="btnRakipExportJson">JSON</button><button class="btn" id="btnRakipExportCsv">CSV</button><button class="btn" id="btnRakipRegexPanel">Regex</button></div><div class="hint" id="rakipStats">Satır: 0 • Atılan (dedup): 0</div><div id="rakipTestPreviewWrap" class="hint">Test önizleme henüz yok.</div></div><div class="card" style="overflow:auto"><table><thead><tr><th>Platform</th><th>İlan Başlığı</th><th>Hizmet</th><th>Mağaza</th><th>Garanti</th><th>Fiyat</th><th>Reklam</th></tr></thead><tbody id="tblRakipBody"></tbody></table><div class="empty" id="marketEmpty">Henüz rakip verisi yok.</div></div></div><script src="rakip.js"></script></body></html>
